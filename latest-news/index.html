<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Latest News | Signor Vale</title>
  <meta name="description" content="Daily tech headlines from top Hacker News stories, curated for quick reading." />
  <meta name="robots" content="index,follow,max-image-preview:large" />
  <link rel="canonical" href="https://signorvale.com/latest-news/" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Latest News | Signor Vale" />
  <meta property="og:description" content="Daily tech news stream so you can read fresh updates every day." />
  <meta property="og:url" content="https://signorvale.com/latest-news/" />
  <meta property="og:image" content="https://signorvale.com/og-image.svg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Latest News | Signor Vale" />
  <meta name="twitter:description" content="Daily tech headlines pulled from Hacker News." />
  <meta name="twitter:image" content="https://signorvale.com/og-image.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ecf0f3;
      --panel: #ecf0f3;
      --text: #1f2b3d;
      --muted: #6e7b90;
      --accent: #4f6486;
      --shadow-out: 18px 18px 30px #d1d9e6, -18px -18px 30px #ffffff;
      --shadow-soft: 10px 10px 20px #d1d9e6, -10px -10px 20px #ffffff;
      --shadow-inset: inset 10px 10px 20px #d6deea, inset -10px -10px 20px #ffffff;
    }

    body {
      min-height: 100vh;
      font-family: "Manrope", "Avenir Next", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .container { max-width: 1080px; margin: 0 auto; padding: 30px 18px 70px; }
    .panel { background: var(--panel); border-radius: 30px; box-shadow: var(--shadow-out); }

    .top {
      padding: 22px;
      margin-bottom: 26px;
    }

    .top-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }

    .chip {
      text-decoration: none;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 8px 13px;
      border-radius: 999px;
      box-shadow: var(--shadow-soft);
    }

    .chip:hover { color: var(--text); box-shadow: var(--shadow-inset); }

    h1 {
      font-family: "Sora", "Manrope", sans-serif;
      font-size: clamp(30px, 5vw, 52px);
      letter-spacing: -0.03em;
      margin-bottom: 10px;
    }

    .lead {
      color: var(--muted);
      max-width: 680px;
      font-size: 17px;
      margin-bottom: 16px;
    }

    .status-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .status {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      font-weight: 700;
    }

    .refresh-btn {
      border: 0;
      background: var(--panel);
      color: var(--text);
      padding: 9px 15px;
      border-radius: 999px;
      box-shadow: var(--shadow-soft);
      font-weight: 700;
      cursor: pointer;
    }

    .refresh-btn:hover { box-shadow: var(--shadow-inset); }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }

    .card {
      border-radius: 22px;
      background: var(--panel);
      box-shadow: var(--shadow-soft);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 210px;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 700;
    }

    .card h2 { font-size: 20px; line-height: 1.3; }

    .card-link {
      margin-top: auto;
      width: fit-content;
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
    }

    .card-link:hover { color: var(--text); }
    .empty { padding: 24px; color: var(--muted); text-align: center; }

    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
      .card h2 { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="panel top">
      <div class="top-links">
        <a class="chip" href="/">Home</a>
        <a class="chip" href="/news/">News Archive</a>
        <a class="chip" href="/blog/">Blog</a>
      </div>
      <h1>Latest News</h1>
      <p class="lead">Fresh tech headlines you can read daily. This page auto-refreshes from the live feed.</p>
      <div class="status-row">
        <p id="last-updated" class="status">Loading latest stories...</p>
        <button id="refresh-button" class="refresh-btn" type="button">Refresh feed</button>
      </div>
    </header>

    <main id="news-grid" class="grid" aria-live="polite"></main>
  </div>

  <script>
    const grid = document.getElementById("news-grid");
    const statusText = document.getElementById("last-updated");
    const refreshButton = document.getElementById("refresh-button");

    function formatTime(isoDate) {
      if (!isoDate) return "Unknown time";
      const parsed = new Date(isoDate);
      if (Number.isNaN(parsed.getTime())) return "Unknown time";
      return parsed.toLocaleString(undefined, { dateStyle: "medium", timeStyle: "short" });
    }

    function renderStories(items) {
      if (!Array.isArray(items) || items.length === 0) {
        grid.innerHTML = '<section class="panel empty">No news available right now. Try refreshing in a minute.</section>';
        return;
      }

      grid.innerHTML = "";
      for (const item of items) {
        const card = document.createElement("article");
        card.className = "card";

        const meta = document.createElement("p");
        meta.className = "meta";
        meta.textContent = `${item.source || "Hacker News"} | ${formatTime(item.publishedAt)} | ${Number(item.score || 0)} pts | ${Number(item.comments || 0)} comments`;

        const title = document.createElement("h2");
        title.textContent = item.title || "Untitled story";

        const link = document.createElement("a");
        link.className = "card-link";
        link.href = item.url || "#";
        link.target = "_blank";
        link.rel = "noopener noreferrer";
        link.textContent = "Read article";

        card.appendChild(meta);
        card.appendChild(title);
        card.appendChild(link);
        grid.appendChild(card);
      }
    }

    async function loadStories() {
      statusText.textContent = "Updating live feed...";
      try {
        const response = await fetch("/api/latest-news", { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        renderStories(payload.items);
        const generated = payload.generatedAt ? new Date(payload.generatedAt) : new Date();
        statusText.textContent = `Last updated: ${generated.toLocaleString()}`;
      } catch (error) {
        renderStories([]);
        statusText.textContent = "Feed temporarily unavailable";
        console.error(error);
      }
    }

    refreshButton.addEventListener("click", loadStories);
    loadStories();
    setInterval(loadStories, 300000);
  </script>
</body>
</html>
